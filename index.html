<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dog Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Dog Explorer App</h1>

  <div class="buttons">
    <button id="loadBreeds">Load Breeds</button>
    <button id="getFact">Get Dog Fact</button>
    <button id="loadGroups">Load Groups</button>
  </div>

  <p id="status"></p>

  <section>
    <h2>Dog Fact</h2>
    <p id="fact"></p>
  </section>

  <section>
    <h2>Breeds</h2>
    <div id="breeds"></div>
  </section>

  <section>
    <h2>Breed Details</h2>
    <div id="breedDetails"></div>
  </section>

  <section>
    <h2>Dog Groups</h2>
    <div id="groups"></div>
  </section>

  <script src="index.js"></script>
</body>
</html>
